<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JDBC App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0a0a0a; color: #e8e8e8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #2a2a2a; width: 450px; }
        h2 { color: #f0a030; text-align: center; }
        label { display: block; margin: 10px 0 5px; color: #dddddd; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; background-color: #0a0a0a; color: #e8e8e8; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3bc51f; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 4px; }
        button:hover { background-color: #2ea01a; }
        .btn-view { background-color: #4a7cff; }
        .btn-view:hover { background-color: #3658b3; }
        hr { border-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Registration</h2>
        
        <form action="addUser" method="POST">
            <label>First Name:</label>
            <input type="text" name="firstName" required>
            
            <label>Last Name:</label>
            <input type="text" name="lastName" required>
            
            <label>Age:</label>
            <input type="number" name="age" required min="1">
            
            <button type="submit">Save User</button>
        </form>

        <hr>

        <form action="viewUsers" method="GET">
            <button type="submit" class="btn-view">View All Users</button>
        </form>
    </div>
</body>
</html>
